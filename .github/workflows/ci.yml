name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0

      - name: Install toolchain
        run: mise install

      - name: Install project dependencies
        run: mise run setup

      - name: Run pre-commit checks
        run: mise exec -- python -m pre_commit run --all-files --show-diff-on-failure

      - name: Run unit tests
        run: mise run test

      - name: Build application
        run: mise run build

      - name: Build Storybook
        run: mise run storybook

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0

      - name: Install toolchain
        run: mise install

      - name: Install project dependencies
        run: |
          mise exec -- npm ci
          mise exec -- python -m pip install --upgrade pip
          mise exec -- python -m pip install -r requirements-dev.txt

      - name: Install Playwright browser and dependencies
        run: mise exec -- npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: mise run test-e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
