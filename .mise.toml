[tools]
gitleaks = "8.30.1"
node = "24.14.1"
pnpm = "11.5.2"
python = "3.12.3"

[settings]
python.github_attestations = false

[tasks.setup]
description = "Install pnpm and Python dependencies for local development"
run = [
  "pnpm install --frozen-lockfile",
  "python -m pip install --upgrade pip",
  "python -m pip install -r requirements-dev.txt",
  "pnpm exec playwright install chromium"
]

[tasks.format]
description = "Format all source files"
run = "pnpm run format"

[tasks.lint]
description = "Run lint and Markdown checks"
run = [
  "gitleaks git --redact --verbose",
  "pnpm run lint",
  "pnpm run lint:docs"
]

[tasks.secret-scan]
description = "Scan the repository for committed secrets"
run = "gitleaks git --redact --verbose"

[tasks.audit]
description = "Audit third-party dependencies for known vulnerabilities"
run = "pnpm audit --audit-level=high"

[tasks.sbom]
description = "Generate a software bill of materials (SBOM)"
run = "pnpm run sbom"

[tasks.typecheck]
description = "Run TypeScript type checks"
run = "pnpm run typecheck"

[tasks.test]
description = "Run unit tests"
run = "pnpm run test:unit"

[tasks.test-e2e]
description = "Run Playwright end-to-end tests"
run = "pnpm run test:e2e"

[tasks.build]
description = "Build the Vue app"
run = "pnpm run build"

[tasks.storybook]
description = "Build Storybook"
run = "pnpm run storybook:build"

[tasks.check]
description = "Run the same checks as CI"
run = "pnpm run check"
