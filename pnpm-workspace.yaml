packages:
  - .

# Vite toolchain needs esbuild's postinstall step. Keep the allowlist explicit.
allowBuilds:
  esbuild: true

# Wait 14 days before adopting newly published packages by default.
minimumReleaseAge: 20160
# Prefer mature versions first, but don't block setup if none exists in range.
minimumReleaseAgeStrict: false
# Keep exceptions version-pinned so the wait rule still applies everywhere else.
minimumReleaseAgeExclude:
  - '@eslint/plugin-kit@0.7.2'
  - '@storybook/addon-a11y@10.4.2'
  - '@storybook/addon-docs@10.4.2'
  - '@storybook/builder-vite@10.4.2'
  - '@storybook/csf-plugin@10.4.2'
  - '@storybook/react-dom-shim@10.4.2'
  - '@storybook/vue3-vite@10.4.2'
  - '@storybook/vue3@10.4.2'
  - '@typescript-eslint/eslint-plugin@8.60.1'
  - '@typescript-eslint/parser@8.60.1'
  - '@typescript-eslint/project-service@8.60.1'
  - '@typescript-eslint/scope-manager@8.60.1'
  - '@typescript-eslint/tsconfig-utils@8.60.1'
  - '@typescript-eslint/type-utils@8.60.1'
  - '@typescript-eslint/types@8.60.1'
  - '@typescript-eslint/typescript-estree@8.60.1'
  - '@typescript-eslint/utils@8.60.1'
  - '@typescript-eslint/visitor-keys@8.60.1'
  - '@vitest/coverage-v8@4.1.8'
  - '@vitest/expect@4.1.8'
  - '@vitest/mocker@4.1.8'
  - '@vitest/pretty-format@4.1.8'
  - '@vitest/runner@4.1.8'
  - '@vitest/snapshot@4.1.8'
  - '@vitest/spy@4.1.8'
  - '@vitest/utils@4.1.8'
  - '@vue/test-utils@2.4.11'
  - eslint-plugin-vue@10.9.2
  - eslint@10.4.1
  - storybook@10.4.2
  - typescript-eslint@8.60.1
  - vitest@4.1.8
  - vue-eslint-parser@10.4.1
