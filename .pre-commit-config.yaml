repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=500']

  - repo: local
    hooks:
      - id: gitleaks
        name: gitleaks
        entry: python scripts/run_with_mise.py gitleaks git --pre-commit --redact --staged --verbose
        language: python
        pass_filenames: false

      - id: prettier-check
        name: prettier-check
        entry: python scripts/run_with_mise.py pnpm run format:check
        language: python
        pass_filenames: false

      - id: eslint
        name: eslint
        entry: python scripts/run_with_mise.py pnpm run lint
        language: python
        pass_filenames: false

      - id: markdownlint
        name: markdownlint
        entry: python scripts/run_with_mise.py pnpm run lint:docs
        language: python
        pass_filenames: false

      - id: typecheck
        name: typecheck
        entry: python scripts/run_with_mise.py pnpm run typecheck
        language: python
        pass_filenames: false

      - id: unit-tests
        name: unit-tests
        entry: python scripts/run_with_mise.py pnpm run test:unit
        language: python
        pass_filenames: false
        stages: [pre-push]
