repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: check-yaml

  - repo: local
    hooks:
      - id: prettier-check
        name: prettier-check
        entry: npm run format:check
        language: system
        pass_filenames: false

      - id: eslint
        name: eslint
        entry: npm run lint
        language: system
        pass_filenames: false

      - id: markdownlint
        name: markdownlint
        entry: npm run lint:docs
        language: system
        pass_filenames: false

      - id: typecheck
        name: typecheck
        entry: npm run typecheck
        language: system
        pass_filenames: false

      - id: unit-tests
        name: unit-tests
        entry: npm run test:unit
        language: system
        pass_filenames: false
        stages: [pre-push]
